<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>app - SWIPEKING</title>
    <!-- connect GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- appel CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- content RANKING -->
    <div id="topbar" class="container-sm g-0 bg-dark vh-100 d-flex flex-column justify-content-between wrapper_appranking">
      <!-- bloc TABLE -->
      <div class="row g-0 d-flex flex-row justify-content-center align-items-center vh-100">
        <div class="col-12 text-white mt-3">
          <div class="row g-0">
            <div class="col-5 offset-1 text-white">
              <h3 class="p-0 m-0 mb-3">Swipe <span class="text-warning">Top 10</span></h3>
              <div class="table-responsive">
                <table class="table table-dark table-striped table-sm" id="swipeTopTable">
                  <thead>
                    <tr>
                      <th scope="col">
                        <p class="fw-normal text-warning p-0 m-0">#</p>
                      </th>
                      <th scope="col">
                        <p class="fw-normal text-warning p-0 m-0">Nom</p>
                      </th>
                      <th scope="col">
                        <p class="fw-normal text-warning p-0 m-0">Score (cm)</p>
                      </th>
                    </tr>
                  </thead>
                  <tbody id="swipeTopBody"></tbody>
                </table>
              </div>
            </div>

		<div class="col-5 text-white ms-4">
  		<h3 class="p-0 m-0 mb-3">Rope <span class="text-warning">Top 3</span></h3>
  		<div
    		id="levelsContainer"
   		class="row row-cols-3 gx-1 gy-2"
    		style="max-height:75vh; overflow-y:auto;"
  		>
		</div>
		</div>

          </div>
        </div>
      </div>
      <!-- bloc CTA -->
      <div class="row g-0">
        <div class="col-6 offset-3 my-5 text-center">
          <a href="index.html" class="btn btn-outline-secondary w-50">back</a>
        </div>
      </div>
    </div>

    <!-- appel JS -->
   <script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js';
import {
  collection,
  getDocs,
  query,
  orderBy,
  limit,
  doc,
  getDoc,
  getFirestore
} from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';

/* =========================
   FIREBASE
========================= */

const firebaseConfig = {
  apiKey: 'AIzaSyB6z3ajkXJr7NIj7PmAkREA9uieAttGyk0',
  authDomain: 'swipe-king-6f95b.firebaseapp.com',
  projectId: 'swipe-king-6f95b',
  storageBucket: 'swipe-king-6f95b.firebasestorage.app',
  messagingSenderId: '149048703091',
  appId: '1:149048703091:web:8bd7b61d44648fd4a7d206',
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
await signInAnonymously(auth);
const db = getFirestore(app);

/* =========================
   VISUAL HELP
========================= */

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* =========================
   LIVE STATS (10s)
========================= */

async function updateActiveRooms() {
  const snap = await getDocs(collection(db, 'rooms_1v1'));
  const el = document.getElementById('activeRooms');
  if (el) el.textContent = 'Active Rope : ' + snap.size;
}

async function updateSwipeVisits() {
  const snap = await getDoc(doc(db, 'stats', 'global'));
  const v = snap.exists() ? snap.data()?.visits ?? 0 : 0;

  const el = document.getElementById('swipeVisits');
  if (el) el.textContent = 'Swipe King : ' + v;
}

async function updateRopeVisits() {
  const snap = await getDoc(doc(db, 'statsropesolo', 'global'));
  const v = snap.exists() ? snap.data()?.visits ?? 0 : 0;

  const el = document.getElementById('ropeVisits');
  if (el) el.textContent = 'Rope Solo : ' + v;
}

/* =========================
   SWIPE TOP (LOAD ONLY)
========================= */

async function updateSwipeTop() {
  const q = query(
    collection(db, 'scores'),
    orderBy('score', 'desc'),
    limit(10)
  );

  const snap = await getDocs(q);

  let rows = '';
  let i = 1;

  snap.forEach(d => {
    const s = d.data();
    rows += `
      <tr>
        <th>${i++}</th>
        <td>${escapeHtml(s.name ?? '???')}</td>
        <td>${escapeHtml(s.score ?? 0)}</td>
      </tr>`;
  });

  const el = document.getElementById('swipeTopBody');
  if (el) el.innerHTML = rows;
}

/* =========================
   ROPE TOP (LOAD ONLY)
========================= */

async function updateRopeTop10() {
  const container = document.getElementById('levelsContainer');
  container.innerHTML = '';

  const snap = await getDocs(collection(db, 'scoresropesolo'));

  const levels = {};

  snap.forEach(d => {
    const data = d.data();
    if (!data.level) return;

    if (!levels[data.level]) levels[data.level] = [];

    levels[data.level].push({
      name: data.name ?? '???',
      time: Number(data.time)
    });
  });

  for (let level = 1; level <= 22; level++) {
	const wrapper = document.createElement('div');
	wrapper.className = 'col';

	const card = document.createElement('div');
	card.className = 'p-3 bg-dark text-white rounded h-100';

    const title = document.createElement('h5');
    title.className = 'text-warning';
    title.textContent = `Level ${level}`;
    card.appendChild(title);

    let list = levels[level] || [];
    list.sort((a, b) => a.time - b.time);
    list = list.slice(0, 3);

    if (list.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'text-secondary';
      empty.textContent = 'No score';
      card.appendChild(empty);
    } else {
      list.forEach((s, i) => {
        const row = document.createElement('div');
        row.textContent = `${i + 1}. ${s.name} - ${s.time.toFixed(2)}s`;
        card.appendChild(row);
      });
    }

	wrapper.appendChild(card);
	container.appendChild(wrapper);
  }
}

/* =========================
   LOOP CLEAN (ONLY LIVE DATA)
========================= */

setInterval(() => {
  updateActiveRooms();
  updateSwipeVisits();
  updateRopeVisits();
}, 10000);

/* =========================
   INIT
========================= */

async function init() {
  // live
  updateActiveRooms();
  updateSwipeVisits();
  updateRopeVisits();

  // static (load only)
  updateSwipeTop();
  updateRopeTop10();
}

init();
</script>
    <script src="dist/js/bootstrap.bundle.js"></script>
  </body>
</html>
