<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Swipe King</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
touch-action:none;
display:flex;
flex-direction:column;
min-height:100dvh;
padding-top:env(safe-area-inset-top);
padding-bottom:env(safe-area-inset-bottom);
}

#title{font-size:2em;margin-top:6px}
#subtitle{opacity:.6;font-size:.9em;margin-bottom:6px}

#game{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:8px;
}

#distance{font-size:2.3em}

#arena{
position:relative;
width:28vw;
height:52vh;
max-width:110px;
max-height:420px;
border-radius:12px;
overflow:hidden;
background:linear-gradient(180deg,#220000,#111,#010);
}

#rope{
position:absolute;
width:100%;
height:200%;
top:-50%;
background:repeating-linear-gradient(
to bottom,
#ffcc88,
#ffcc88 10px,
#aa7744 10px,
#aa7744 20px
);
transition:transform .05s linear;
}

#enemy{
position:absolute;
width:100%;
height:100%;
background:rgba(255,0,0,.18);
opacity:0;
}

#marker{
position:absolute;
width:100%;
height:6px;
top:50%;
background:white;
box-shadow:0 0 10px white;
}

#end{
position:fixed;
inset:0;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.95);
z-index:9999;
gap:12px;
}

#counter{
position:fixed;
top:10px;
right:10px;
background:rgba(0,0,0,0.6);
padding:6px 10px;
border-radius:8px;
font-size:.9em;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div id="counter">👁 0</div>
<div id="title">👑 SWIPE KING</div>
<div id="subtitle">A stress game by Alexandre Baranger</div>

<div id="game">
<div id="distance">0 cm</div>

<div id="arena">
<div id="enemy"></div>
<div id="rope"></div>
<div id="marker"></div>
</div>
</div>

<div id="end"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6z3ajkXJr7NIj7PmAkREA9uieAttGyk0",
  authDomain: "swipe-king-6f95b.firebaseapp.com",
  projectId: "swipe-king-6f95b",
  storageBucket: "swipe-king-6f95b.firebasestorage.app",
  messagingSenderId: "149048703091",
  appId: "1:149048703091:web:8bd7b61d44648fd4a7d206"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// scores
async function saveScore(name, score){
  await addDoc(collection(db, "scores"), {
    name,
    score,
    date: Date.now()
  });
}

// leaderboard
async function getScores(){
  const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(10));
  const snap = await getDocs(q);

  let html = "";
  snap.forEach(doc=>{
    const s = doc.data();
    html += `<div>${s.name} - ${s.score} cm</div>`;
  });

  return html;
}

// compteur
async function incrementVisits(){
  const ref = collection(db, "visits");
  await addDoc(ref, { t: Date.now() });
  const snap = await getDocs(ref);
  return snap.size;
}

// expose
window.saveScore = saveScore;
window.getScores = getScores;
window.incrementVisits = incrementVisits;
</script>

<!-- 🎮 TON JEU -->
<script>
let distance=0;
let lastY=null;
let holding=false;
let gameOver=false;

let enemyForce=0.18;

const d=document.getElementById("distance");
const end=document.getElementById("end");
const rope=document.getElementById("rope");

const audio=new (window.AudioContext||window.webkitAudioContext)();

function beep(f){
let o=audio.createOscillator();
let g=audio.createGain();
o.connect(g);
g.connect(audio.destination);
o.frequency.value=f;
g.gain.value=.05;
o.start();
o.stop(audio.currentTime+.05);
}

/* 🔥 compteur Firebase */
window.addEventListener("load", ()=>{
incrementVisits().then(count=>{
document.getElementById("counter").textContent = "👁 " + count;
});
});

function swipe(y){
if(!holding||gameOver)return;

let delta=y-lastY;

if(delta>8){
distance += delta * 0.04;
beep(260);
if(navigator.vibrate)navigator.vibrate(5);
}

lastY=y;
}

function update(){
d.textContent=Math.floor(distance)+" cm";

distance -= enemyForce;
if(distance<0)distance=0;

rope.style.transform=`translateY(${Math.sin(distance/10)*4 - enemyForce*30}px)`;
document.body.style.background=`hsl(${distance%360},30%,5%)`;
}

function loop(){
if(gameOver)return;
update();
requestAnimationFrame(loop);
}

async function endGame(){
if(gameOver)return;
gameOver=true;

let score = Math.floor(distance);

let name = prompt("Ton nom ?");
if(!name) name = "Anonyme";

await saveScore(name, score);
let leaderboard = await getScores();

end.style.display="flex";

end.innerHTML=`
<div style="font-size:1.8em">GAME OVER</div>
<div>Distance: ${score} cm</div>

<div style="margin-top:10px">🏆 Classement mondial</div>
<div style="font-size:.9em;opacity:.8">
${leaderboard}
</div>

<button id="retry">Retry</button>
`;

document.getElementById("retry").onclick=()=>location.reload();

if(navigator.vibrate)navigator.vibrate([200,100,200]);
beep(180);
}

window.addEventListener("mousedown",e=>{
holding=true;
lastY=e.clientY;
});

window.addEventListener("mousemove",e=>swipe(e.clientY));

window.addEventListener("mouseup",()=>{
holding=false;
endGame();
});

window.addEventListener("touchstart",e=>{
holding=true;
lastY=e.touches[0].clientY;
},{passive:false});

window.addEventListener("touchmove",e=>{
swipe(e.touches[0].clientY);
},{passive:false});

window.addEventListener("touchend",()=>{
holding=false;
endGame();
});

loop();
</script>

</body>
</html>
