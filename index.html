<!DOCTYPE html>
<html lang="fr">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="topbar">
    <div id="leftPanel">
        <div id="gameTitle">Swipe&Rope</div>
        <div id="activeRooms">🎮 Active Rope : 0</div>
<div id="discordBox">

    <!-- LOGO DISCORD -->

</div>
        <div id="swipeVisits">👁 Swipe King : 0</div>
        <div id="ropeVisits">👁 Rope Solo : 0</div>
    </div>

    <div id="rightPanel">
        <div id="swipeTop"></div>
        <div id="ropeTop"></div>
    </div>
</div>

<div id="title">👑 SWIPE KING</div>
<div id="subtitle">A game by Alexandre Baranger V0.024</div>

<!-- START BUTTON -->
<div id="startScreen">
  <button id="startButton">▶ START</button>
</div>

<!-- OPTIONNEL: zone visible pour scroll mobile -->
<div id="lobbySpacer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore, collection, getDocs, query, orderBy, limit, doc, getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6z3ajkXJr7NIj7PmAkREA9uieAttGyk0",
  authDomain: "swipe-king-6f95b.firebaseapp.com",
  projectId: "swipe-king-6f95b",
  storageBucket: "swipe-king-6f95b.firebasestorage.app",
  messagingSenderId: "149048703091",
  appId: "1:149048703091:web:8bd7b61d44648fd4a7d206"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
await signInAnonymously(auth);
const db = getFirestore(app);

/* =========================
   NAVIGATION VERS GAME
========================= */
document.getElementById("startButton").addEventListener("click", () => {
  window.location.href = "game.html";
});

/* =========================
   TES FONCTIONS FIREBASE
========================= */

async function updateActiveRooms(){
  const snap = await getDocs(collection(db, "rooms_1v1"));
  document.getElementById("activeRooms").textContent =
    "🎮 Active Rope : " + snap.size;
}

async function updateSwipeVisits(){
  const ref = doc(db,"stats","global");
  const snap = await getDoc(ref);
  const v = snap.exists() ? (snap.data()?.visits ?? 0) : 0;
  document.getElementById("swipeVisits").textContent =
    "👁 Swipe King : " + v;
}

async function updateRopeVisits(){
  const ref = doc(db,"statsropesolo","global");
  const snap = await getDoc(ref);
  const v = snap.exists() ? (snap.data()?.visits ?? 0) : 0;
  document.getElementById("ropeVisits").textContent =
    "👁 Rope Solo : " + v;
}

async function updateSwipeTop(){
  const q = query(collection(db,"scores"),orderBy("score","desc"),limit(10));
  const snap = await getDocs(q);

  let html = "";
  let i = 1;

  snap.forEach(d=>{
    const s = d.data();
    html += `${i++}. ${s.name ?? "???"} - ${s.score} cm<br>`;
  });

  document.getElementById("swipeTop").innerHTML =
    "🏆 Swipe Top 10<br>" + html;
}

async function updateRopeTop10(){
  const snap = await getDocs(collection(db,"scoresropesolo"));
  let scores = [];

  snap.forEach(doc=>{
    const d = doc.data();
    if(d.time !== undefined){
      scores.push({name:d.name ?? "???", time:d.time});
    }
  });

  scores.sort((a,b)=>a.time-b.time);
  scores = scores.slice(0,10);

  let html="";
  scores.forEach((s,i)=>{
    html += `${i+1}. ${s.name} - ${s.time.toFixed(2)}s<br>`;
  });

  document.getElementById("ropeTop").innerHTML =
    "🏆 Rope Top 10<br>" + html;
}

/* refresh lobby */
async function refresh(){
  await updateActiveRooms();
  await updateSwipeVisits();
  await updateRopeVisits();
  await updateSwipeTop();
  await updateRopeTop10();
}

refresh();
setInterval(refresh,5000);

</script>

</body>
</html>
