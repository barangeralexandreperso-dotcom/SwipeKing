<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
user-scalable=no">
<title>Swipe King</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="topbar">
    <div id="leftPanel">
        <div id="gameTitle">Swipe&Rope</div>
        <div id="activeRooms">🎮 Active Rope : 0</div>
    </div>

    <div id="counter">👁 0</div>
</div>

<div id="title">👑 SWIPE KING</div>
<div id="subtitle">A game by Alexandre Baranger V0.024</div>
<div id="game">
<div id="distance">0 cm</div> 
<div id="timer">10.0 s</div>
<div id="timeBonus"></div>
<div id="arena"><div id="rope"></div>
</div></div>
<div id="end"></div>
<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy,
  limit,
  doc,
  updateDoc,
  increment,
  getDoc,
  setDoc,
  deleteDoc
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import {getAuth,signInAnonymously}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
const firebaseConfig = {
  apiKey: "AIzaSyB6z3ajkXJr7NIj7PmAkREA9uieAttGyk0",
  authDomain: "swipe-king-6f95b.firebaseapp.com",
  projectId: "swipe-king-6f95b",
  storageBucket: "swipe-king-6f95b.firebasestorage.app",
  messagingSenderId: "149048703091",
  appId: "1:149048703091:web:8bd7b61d44648fd4a7d206"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
await signInAnonymously(auth);
const db = getFirestore(app);
window.saveScore = async (name, score) => {
  const user = auth.currentUser;
  if (!user) return;
  if(score < 0 || score > 50000) return;
  await addDoc(collection(db,"scores"),{
    uid:user.uid,
    name:name.substring(0,20),
    score,
    date:Date.now()
  });
const q = query(
  collection(db,"scores"),
  orderBy("score","desc")
);
  const snap = await getDocs(q);
  const docs = snap.docs;
  if(docs.length > 10){
    const toDelete = docs.slice(10);
    for(const d of toDelete){
      await deleteDoc(doc(db,"scores",d.id));
    }
  }
};
window.getScores = async ()=>{
const q = query(
  collection(db,"scores"),
  orderBy("score","desc"),
  limit(10)
);
  const snap = await getDocs(q);
  let html="";
  snap.forEach(d=>{let s=d.data();html += `<div>${s.name} - ${s.score} cm</div>`;});
  return html;
};
window.incrementVisits = async () => 
{
  const ref = doc(db, "stats", "global");
  try {const snap = await getDoc(ref);
  if (!snap.exists()) {await setDoc(ref, { visits: 1 });return 1;}
  const current = snap.data()?.visits ?? 0;
  await setDoc(ref, {visits: current + 1});
  return current + 1;
} 
catch (e) {console.error("VISITS ERROR:", e);return 0;
}
};
window.updateActiveRooms = async () =>
{
  try
  {
    const snap = await getDocs(collection(db, "rooms_1v1"));
    const count = snap.size;
    console.log("ACTIVE ROOMS =", count);
    document.getElementById("activeRooms").textContent = "🎮 Active Rope : " + count;
  }
  catch (e){console.error("ROOM ERROR:", e);}
};

async function startRoomCounter()
{
  await updateActiveRooms();
  setInterval(updateActiveRooms, 5000);
}

startRoomCounter();
</script>
<script src="script.js"></script>
</body>
</html>
